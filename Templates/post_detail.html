{% extends "base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}

<h2>{{ post.title }}</h2>
<p><strong>Category:</strong> {{ post.category.name }}</p>
<p>{{ post.content }}</p>
{% if user == post.author %}
    <a href="{% url 'blog:post_update' post.id %}">Edit</a> |
    <a href="{% url 'blog:post_delete' post.id %}">Delete</a>
{% endif %}
<a href="{% url 'blog:post_list' %}">Back</a>

{% endblock %}
