<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Blog{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'blog:post_list' %}">My Blog</a>

        <div>
            {% if user.is_authenticated %}
                <span class="text-white me-3">Hello {{ user.username }}</span>
                <a class="btn btn-success btn-sm" href="{% url 'blog:post_create' %}">Create Post</a>
                <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Login</a>
                <a class="btn btn-success btn-sm" href="{% url 'blog:register' %}">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}
</div>

</body>
</html>
