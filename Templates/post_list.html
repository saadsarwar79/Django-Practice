{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">All Posts</h2>

<div class="row">
{% for post in posts %}
    <div class="col-md-4">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title">
                    <a href="{% url 'blog:post_detail' post.id %}">
                        {{ post.title }}
                    </a>
                </h5>
                <p class="card-text">
                    Category: {{ post.category.name }}
                </p>
            </div>
        </div>
    </div>
{% empty %}
    <p>No posts available.</p>
{% endfor %}
</div>

{% endblock %}
